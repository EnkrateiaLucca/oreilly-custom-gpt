        # First, an honest caveat
        ### MCP isn't a Claude exclusive anymore

        ---

        # MCP is now an open, cross-vendor standard

        --

        - <span style="font-size:1.2em;">🔓</span> **Open protocol** - Anthropic published MCP, but it's vendor-neutral: build one server, use it in Claude, ChatGPT, Gemini, Cursor & VS Code

        --

        - <span style="font-size:1.2em;">🟢</span> **ChatGPT shipped full MCP** - Developer Mode (late 2025) added read + write MCP tools; "apps" (formerly connectors) are now its primary integration path

        --

        - <span style="font-size:1.2em;">➡️</span> **So the question shifts** - not *whether* a tool has MCP, but *how frictionless it is* and *what's built on top of it*

        ---
        class: center, middle

        # Where Claude Desktop still pulls ahead
        ### Frictionless MCP for everyday users

        ---

        # Installing a connector is one click

        --

        - <span style="font-size:1.2em;">⚙️</span> **Browse the in-app Directory** - `+` menu → Connectors → add, no config files to edit

        --

        - <span style="font-size:1.2em;">🌐</span> **Local or remote** - OAuth-aligned MCP servers, available to any user

        --

        - <span style="font-size:1.2em;">🔒</span> **Compare ChatGPT** - MCP lives behind Developer Mode (beta); write access is gated to Business / Enterprise / Edu, while Plus & Pro stay read-only

        ---

        # Characteristics of Artifacts

        --

        - <span style="font-size:1.2em;">📏</span> **Significant and self-contained** (typically over 15 lines)

        --

        - <span style="font-size:1.2em;">🔄</span> **Editable and reusable** - Content likely to be iterated on

        --

        - <span style="font-size:1.2em;">🎯</span> **Complex pieces** that stand on their own

        - <span style="font-size:1.2em;">💾</span> **Reference material** - Intended for future use
